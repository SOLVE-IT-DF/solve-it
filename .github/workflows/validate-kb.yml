# Validates SOLVE-IT knowledge base on every PR and push to main
# Comments are posted by the separate validate-kb-comment.yml workflow
# (using workflow_run) so that fork PRs get write permissions safely.
name: Validate knowledge base

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v3
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate knowledge base
        run: >
          python admin/validate_kb.py --verbose
          --check-ontology
          --markdown-summary kb_validation_summary.md
          --ontology-summary ontology_iri_report.md
      - name: Save PR number
        if: github.event_name == 'pull_request'
        run: echo ${{ github.event.number }} > pr-number.txt
      - name: Upload validation reports
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-reports
          path: |
            kb_validation_summary.md
            ontology_iri_report.md
            pr-number.txt
