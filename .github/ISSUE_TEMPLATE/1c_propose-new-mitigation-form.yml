name: "Propose New Mitigation"
description: Propose a new mitigation using a structured form
title: "Create new mitigation: [mitigation name]"
labels: ["content: new mitigation", "form input"]
body:
  - type: input
    id: mitigation-name
    attributes:
      label: Mitigation name
      description: A suggested name for the mitigation.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A longer description of the mitigation.
      render: text
  - type: textarea
    id: existing-weaknesses
    attributes:
      label: Existing weakness IDs
      description: IDs of existing weaknesses this mitigation applies to (one per line, e.g. DFW-1001, DFW-1014).
      placeholder: Enter one weakness ID per line
      render: text
  - type: input
    id: linked-technique
    attributes:
      label: Linked technique
      description: |
        Some mitigations are links to techniques. This happens when they are complex enough to need longer descriptions, and have their own weaknesses.
        Provide the technique ID if applicable (e.g. DFT-1002). See [DFM-1007](https://github.com/SOLVE-IT-DF/solve-it/blob/main/data/mitigations/DFM-1007.json) for an example.
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Existing DFCite IDs (e.g. DFCite-1003) or full citation text, one per line. New citations will be automatically matched against existing references where possible.
        Optionally add a relevance summary using a pipe, e.g. DFCite-1003 | Describes the validation methodology (max 280 chars).
      placeholder: Enter one reference per line
      render: text
  - type: textarea
    id: other-notes
    attributes:
      label: Any other notes
      description: Any additional information or context you'd like to provide.
