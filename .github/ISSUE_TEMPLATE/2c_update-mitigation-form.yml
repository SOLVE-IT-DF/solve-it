name: "Update Mitigation"
description: Propose changes to an existing mitigation
title: "Update mitigation: [DFM-xxxx: mitigation name]"
labels: ["content: update mitigation", "form input"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update an existing mitigation
        Use this form to propose changes to an existing mitigation.
        **Leave fields blank to keep current values.** Only fill in fields you want to change.
        Existing mitigations (DFM-1001–DFM-1241) can be browsed [here](https://github.com/SOLVE-IT-DF/solve-it/tree/main/data/mitigations) (right-click → open in new tab to keep your progress).
  - type: input
    id: mitigation-id
    attributes:
      label: Mitigation ID
      description: The ID of the mitigation to update (e.g. DFM-1001).
    validations:
      required: true
  - type: input
    id: new-mitigation-name
    attributes:
      label: New mitigation name
      description: Leave blank to keep the current name.
  - type: dropdown
    id: linked-technique-action
    attributes:
      label: Linked technique action
      description: |
        Some mitigations link to a technique. Choose what to do with the linked technique.
        See DFM-1007 for an example.
      options:
        - "No change"
        - "Set new value (provide ID below)"
        - "Remove current link"
    validations:
      required: true
  - type: input
    id: linked-technique-id
    attributes:
      label: Linked technique ID
      description: Only used if 'Set new value' is selected above. Provide the technique ID (e.g. DFT-1002).
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        The complete new list of references — existing DFCite IDs only (e.g. DFCite-1003), one per line.
        If your reference doesn't exist yet, please create it first using the [Propose new reference](https://github.com/SOLVE-IT-DF/solve-it/issues/new?template=1d_propose-new-reference-form.yml) form, then use the assigned DFCite ID here. Alternatively, mention the citation in the notes field below, create the DFCite entry separately, and update the mitigation later.
        Leave blank to keep the current list. If populated, this replaces the entire list.
        Optionally add a relevance summary using a pipe, e.g. DFCite-1003 | Describes the validation methodology (max 280 chars).
      placeholder: "DFCite-1003 | Describes the validation methodology"
      render: text
  - type: textarea
    id: other-notes
    attributes:
      label: Any other notes
      description: Any additional information or context for the proposed changes.
