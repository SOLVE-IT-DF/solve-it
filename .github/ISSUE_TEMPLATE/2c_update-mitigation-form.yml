name: "Update Mitigation"
description: Propose changes to an existing mitigation
title: "Update mitigation: [DFM-xxxx: mitigation name]"
labels: ["content: update mitigation", "form input"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update an existing mitigation
        Use this form to propose changes to an existing mitigation. Fields may be prefilled or blank depending on how you accessed this form. If blank, leaving the fields blank will keep current values. Only fill in fields you want to change. If information is pre-filled, simply edit that information.
        Existing mitigations can be browsed [here](https://github.com/SOLVE-IT-DF/solve-it/tree/main/data/mitigations) (right-click → open in new tab to keep your progress).

        > For general guidance see the [Contributing Guidelines](https://github.com/SOLVE-IT-DF/solve-it/blob/main/CONTRIBUTING.md). For how updates work see the [Detailed Contributor Guide — Update an existing item](https://github.com/SOLVE-IT-DF/solve-it/blob/main/CONTRIBUTOR_GUIDE.md#update-an-existing-item) section, and for naming and writing conventions see the [Style Guide — Mitigations](https://github.com/SOLVE-IT-DF/solve-it/blob/main/STYLE_GUIDE.md#style-guide-for-mitigations) section.
  - type: input
    id: mitigation-id
    attributes:
      label: Mitigation ID
      description: The ID of the mitigation to update (e.g. DFM-1001).
    validations:
      required: true
  - type: input
    id: new-mitigation-name
    attributes:
      label: New mitigation name
      description: "Leave blank to keep the current name. If changing: use sentence case, no full stop. Use an imperative verb phrase (e.g. \"Use dual tool verification\", \"Manually verify relevant data\")."
  - type: dropdown
    id: linked-technique-action
    attributes:
      label: Linked technique action
      description: |
        Some mitigations link to a technique. Choose what to do with the linked technique.
        See DFM-1007 for an example.
      options:
        - "No change"
        - "Set new value (provide ID below)"
        - "Remove current link"
    validations:
      required: true
  - type: input
    id: linked-technique-id
    attributes:
      label: Linked technique ID
      description: Only used if 'Set new value' is selected above. Provide the technique ID (e.g. DFT-1002).
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        The complete new list of references — existing DFCite IDs, one per line. If you need to add a new reference, please use the Propose New Reference form first.
        Leave blank to keep the current list. If populated, this replaces the entire list.
        You should add a relevance summary using a pipe, e.g. DFCite-xxxx | reason why this reference is useful for this mitigation (max 280 chars).
        Focus on why the reference matters to this specific item, not just what it is about.
      placeholder: |
        Enter one reference per line
        DFCite-xxxx | reason why this reference is useful for this mitigation (max 280 chars)
      render: text
  - type: textarea
    id: other-notes
    attributes:
      label: Any other notes
      description: Any additional information or context for the proposed changes.
