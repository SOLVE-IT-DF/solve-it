name: "Update Technique"
description: Propose changes to an existing technique
title: "Update technique: [DFT-xxxx: technique name]"
labels: ["content: update technique", "form input"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update an existing technique
        Use this form to propose changes to an existing technique. Fields may be prefilled or blank depending on how you accessed this form. If blank, leaving the fields blank will keep current values. Only fill in fields you want to change. If information is pre-filled, simply edit that information.
        Existing techniques can be browsed [here](https://github.com/SOLVE-IT-DF/solve-it/tree/main/data/techniques) (right-click → open in new tab to keep your progress).

        > For general guidance see the [Contributing Guidelines](https://github.com/SOLVE-IT-DF/solve-it/blob/main/CONTRIBUTING.md). For how updates work see the [Detailed Contributor Guide — Update an existing item](https://github.com/SOLVE-IT-DF/solve-it/blob/main/CONTRIBUTOR_GUIDE.md#update-an-existing-item) section, and for naming and writing conventions see the [Style Guide — Techniques](https://github.com/SOLVE-IT-DF/solve-it/blob/main/STYLE_GUIDE.md#style-guide-for-techniques) section.
  - type: input
    id: technique-id
    attributes:
      label: Technique ID
      description: The ID of the technique to update (e.g. DFT-1002).
    validations:
      required: true
  - type: input
    id: new-technique-name
    attributes:
      label: New technique name
      description: "Leave blank to keep the current name. If changing: use sentence case, start with an imperative verb (e.g. \"Connect\", \"Locate\", \"Use\"). Synonyms can be updated in a later field."
  - type: textarea
    id: new-description
    attributes:
      label: New description
      description: Leave blank to keep the current description. You can cite references inline using [DFCite-xxxx].
      render: text
  - type: textarea
    id: new-details
    attributes:
      label: New details
      description: Leave blank to keep the current details. You can cite references inline using [DFCite-xxxx].
      render: text
  - type: textarea
    id: synonyms
    attributes:
      label: Synonyms
      description: |
        The complete new list of synonyms (one per line).
        Leave blank to keep the current list. If populated, this replaces the entire list.
      placeholder: Enter one synonym per line
      render: text
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: |
        The complete new list of examples (one per line).
        Leave blank to keep the current list. If populated, this replaces the entire list.
      placeholder: Enter one example per line
      render: text
  - type: textarea
    id: subtechnique-ids
    attributes:
      label: Subtechnique IDs
      description: |
        The complete new list of subtechnique IDs (one per line).
        Leave blank to keep the current list. If populated, this replaces the entire list.
        Existing techniques can be browsed [here](https://github.com/SOLVE-IT-DF/solve-it/tree/main/data/techniques).
      placeholder: |
        Enter one subtechnique ID per line
        e.g. DFT-xxxx
      render: text
  - type: textarea
    id: weakness-ids
    attributes:
      label: Weakness IDs
      description: |
        The complete new list of weakness IDs (one per line).
        Leave blank to keep the current list. If populated, this replaces the entire list.
        Existing weaknesses can be browsed [here](https://github.com/SOLVE-IT-DF/solve-it/tree/main/data/weaknesses).
      placeholder: |
        Enter one weakness ID per line
        e.g. DFW-xxxx
      render: text
  - type: textarea
    id: new-weaknesses
    attributes:
      label: Propose new weaknesses
      description: |
        Describe new weaknesses for this technique (one per line, e.g. Imaging process may miss data in hidden areas).
        These will be created as new weakness entries and linked to the technique.
      placeholder: Enter one weakness description per line
      render: text
  - type: textarea
    id: case-input
    attributes:
      label: Ontology input classes
      description: |
        The complete new list of ontology input classes as full IRIs (one per line).
        Leave blank to keep the current list. If populated, this replaces the entire list.
        Classes from CASE, UCO, or SOLVE-IT ontologies.
        Browse existing classes at the [CASE Ontology A-Z](https://ontology.caseontology.org/documentation/entities-az.html),
        [SOLVE-IT Ontology A-Z](https://ontology.solveit-df.org/entities-az.html), or the [FOCAL web app](https://focal.hargs.co.uk/#?groups=UCO,CASE,SOLVE-IT).
        To propose a new class, describe it in the notes section below.
      placeholder: "Enter one full IRI per line, e.g. https://ontology.unifiedcyberontology.org/uco/observable/File"
      render: text
  - type: textarea
    id: case-output
    attributes:
      label: Ontology output classes
      description: |
        The complete new list of ontology output classes as full IRIs (one per line).
        Leave blank to keep the current list. If populated, this replaces the entire list.
        Classes from CASE, UCO, or SOLVE-IT ontologies.
        Browse existing classes at the [CASE Ontology A-Z](https://ontology.caseontology.org/documentation/entities-az.html),
        [SOLVE-IT Ontology A-Z](https://ontology.solveit-df.org/entities-az.html), or the [FOCAL web app](https://focal.hargs.co.uk/#?groups=UCO,CASE,SOLVE-IT).
        To propose a new class, describe it in the notes section below.
      placeholder: "Enter one full IRI per line, e.g. https://ontology.unifiedcyberontology.org/uco/observable/File"
      render: text
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        The complete new list of references — existing DFCite IDs, one per line. If you need to add a new reference, please use the Propose New Reference form first.
        Leave blank to keep the current list. If populated, this replaces the entire list.
        You should add a relevance summary using a pipe, e.g. DFCite-xxxx | reason why this reference is useful for this technique (max 280 chars).
        Focus on why the reference matters to this specific item, not just what it is about.
      placeholder: |
        Enter one reference per line
        DFCite-xxxx | reason why this reference is useful for this technique (max 280 chars)
      render: text
  - type: textarea
    id: other-notes
    attributes:
      label: Any other notes
      description: |
        Any additional information or context for the proposed changes.
        If you left the ontology class fields blank, a brief description of the types of data the technique takes as input and produces as output is still very helpful.
