name: "Propose New Weakness"
description: Propose a new weakness using a structured form
title: "Create new weakness: [weakness name]"
labels: ["content: new weakness", "form input"]
body:
  - type: input
    id: weakness-name
    attributes:
      label: Weakness name
      description: A suggested, fairly short name for the weakness.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A longer description of the nature of the weakness.
      render: text
  - type: textarea
    id: categories
    attributes:
      label: Categories
      description: Enter one class code per line. Valid codes — ASTM_INCOMP (Incompleteness), ASTM_INAC_EX (Inaccuracy: Existence), ASTM_INAC_AS (Inaccuracy: Association), ASTM_INAC_ALT (Inaccuracy: Alteration), ASTM_INAC_COR (Inaccuracy: Corruption), ASTM_MISINT (Misinterpretation).
  - type: textarea
    id: existing-mitigations
    attributes:
      label: Existing mitigation IDs
      description: IDs of existing mitigations that apply to this weakness (one per line, e.g. DFM-1001, DFM-1012).
      render: text
  - type: textarea
    id: new-mitigations
    attributes:
      label: Propose new mitigations
      description: Describe new mitigations for this weakness (one per line).
      render: text
  - type: textarea
    id: relevant-techniques
    attributes:
      label: Techniques this applies to
      description: Techniques that this weakness applies to (one per line, e.g. DFT-1001, DFT-1028).
      render: text
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        Existing DFCite IDs (e.g. DFCite-1003) or full citation text, one per line. New citations will be automatically matched against existing references where possible.
        Optionally add a relevance summary using a pipe, e.g. DFCite-1003 | Describes the validation methodology (max 280 chars).
      render: text
  - type: textarea
    id: other-notes
    attributes:
      label: Any other notes
      description: Any additional information or context you'd like to provide.
