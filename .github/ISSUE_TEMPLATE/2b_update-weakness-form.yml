name: "Update Weakness"
description: Propose changes to an existing weakness
title: "Update weakness: [DFW-xxxx: weakness name]"
labels: ["content: update weakness", "form input"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update an existing weakness
        Use this form to propose changes to an existing weakness.
        **Leave fields blank (or all unchecked) to keep current values.** Only fill in fields you want to change.
        Existing weaknesses (DFW-1001–DFW-1278) can be browsed [here](https://github.com/SOLVE-IT-DF/solve-it/tree/main/data/weaknesses).
  - type: input
    id: weakness-id
    attributes:
      label: Weakness ID
      description: The ID of the weakness to update (e.g. DFW-1001).
      placeholder: DFW-1001
    validations:
      required: true
  - type: input
    id: new-weakness-name
    attributes:
      label: New weakness name
      description: Leave blank to keep the current name.
  - type: textarea
    id: categories
    attributes:
      label: Categories
      description: |
        Enter one class code per line. Leave blank to keep current values.
        If populated, this replaces the entire list.
        Valid ASTM classes:
        ASTM_INCOMP - Incompleteness (failure to recover live/deleted artefacts)
        ASTM_INAC_EX - Inaccuracy: Existence (presenting artefacts for non-existent items)
        ASTM_INAC_AS - Inaccuracy: Association (e.g. live data presented as deleted)
        ASTM_INAC_ALT - Inaccuracy: Alteration (modifying content of digital data)
        ASTM_INAC_COR - Inaccuracy: Corruption
        ASTM_MISINT - Misinterpretation (results presented in misleading ways)
      placeholder: "ASTM_INCOMP"
  - type: textarea
    id: mitigation-ids
    attributes:
      label: Mitigation IDs
      description: |
        The complete new list of mitigation IDs (one per line, e.g. DFM-1001, DFM-1012).
        Leave blank to keep the current list. If populated, this replaces the entire list.
        Existing mitigations can be browsed [here](https://github.com/SOLVE-IT-DF/solve-it/tree/main/data/mitigations).
      render: text
  - type: textarea
    id: new-mitigations
    attributes:
      label: Propose new mitigations
      description: |
        Describe new mitigations for this weakness (one per line).
        These will be created as new mitigation entries and linked to the weakness.
      render: text
  - type: textarea
    id: references
    attributes:
      label: References
      description: |
        The complete new list of references — existing DFCite IDs (e.g. DFCite-1003) or full citation text, one per line.
        New citations will be automatically matched against existing references where possible.
        Leave blank to keep the current list. If populated, this replaces the entire list.
      render: text
  - type: textarea
    id: other-notes
    attributes:
      label: Any other notes
      description: Any additional information or context for the proposed changes.
